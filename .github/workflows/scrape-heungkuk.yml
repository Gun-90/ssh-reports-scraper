name: Heungkuk Scraper → SCP

on:
  # schedule:
  # # KST 08-17 평일 매시간
  # - cron: '0 * * * 1-5'
    
  workflow_dispatch:

jobs:
  scrape-and-scp:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv sync --frozen --no-cache

      - name: Run Heungkuk scraper
        env:
          HEUNGKUK_URLS_JSON: ${{ secrets.HEUNGKUK_URLS_JSON }}
        run: |
          uv run python run/standalone/heungkuk.py > heungkuk_result.json 2>heungkuk_log.txt
          echo "=== Scraper Log ==="
          cat heungkuk_log.txt
          COUNT=$(python3 -c "import json; print(len(json.load(open('heungkuk_result.json'))))")
          echo "Articles collected: $COUNT"

      - name: SCP to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          scp -P ${{ secrets.SERVER_PORT || 22 }} heungkuk_result.json ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:incoming/ga-scrapes/
          echo "SCP transfer complete"
