name: BNK Scraper (GitHub Actions IP)

on:
  workflow_dispatch:  # 수동 실행 가능
  # schedule:
  #   # 한국시간 평일 08:00, 14:00, 18:00 (UTC 기준)
  #   - cron: '0 23,5,9 * * 1-5'

jobs:
  scrape-bnk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install aiohttp beautifulsoup4

      - name: Show runner IP info
        run: |
          echo "=== GitHub Actions Runner IP ==="
          curl -s https://api.ipify.org
          echo ""
          echo "================================"

      - name: Setup BNK secrets
        env:
          BNK_SECRETS_JSON: \${{ secrets.BNK_URLS_JSON }}
        run: |
          mkdir -p ~/secrets/ssh-reports-scraper
          echo "\$BNK_SECRETS_JSON" > ~/secrets/ssh-reports-scraper/secrets.json

      - name: Run BNK standalone scraper
        id: scraper
        run: |
          python3 scripts/standalone_bnk_scraper.py > /tmp/bnk_result.json 2>/tmp/bnk_log.txt
          cat /tmp/bnk_log.txt

      - name: Upload scraped JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bnk-scraped-data
          path: /tmp/bnk_result.json

      - name: Show scraped data summary
        run: |
          echo "=== BNK Scraping Result ==="
          python3 -c "
          import json
          with open('/tmp/bnk_result.json') as f:
              data = json.load(f)
          print(f'Total articles: {data[\"count\"]}')
          for a in data['articles'][:5]:
              print(f'  [{a[\"board_name\"]}] {a[\"article_title\"][:60]}... ({a[\"reg_dt\"]})')
          "
