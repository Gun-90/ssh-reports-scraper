    restart: always
    network_mode: "host"
    env_file: .env
    volumes:
      - ~/sqlite3:/app/db
      - ~/logs:/log
    environment:
      - APP_ENV=${APP_ENV:-production}
      - SQLITE_DB_PATH=/app/db/telegram.db
      - LOG_BASE_DIR=/log
      - TZ=Asia/Seoul
      - POSTGRES_HOST=localhost
    command: [".venv/bin/python", "scheduler_keyword_alert.py"]
    logging:
